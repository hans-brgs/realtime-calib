# Single stack (ADR-0014): Caddy (TLS) is the mandatory entry point, always present.
# Access: https://<HOST_IP> (tablet) or https://localhost (same-machine).

services:
  # Reverse proxy + TLS termination + static webapp (single entry point).
  caddy:
    build:
      context: .
      dockerfile: caddy/Dockerfile
      args:
        # VITE_HOST_IP is inlined into the webapp at build time, from root HOST_IP.
        VITE_HOST_IP: ${HOST_IP}
    container_name: calib-caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/certs:/certs:ro
    env_file:
      - ./.env
    # Reach the host-network LiveKit signaling (7880) from this bridge container.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - calib-network
    logging: &default-logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Capture + detection + LiveKit publishing + HTTP API + session state.
  calibration-service:
    build:
      context: ./calibration-service
      dockerfile: Dockerfile
    container_name: calibration-service
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      # LiveKit runs on the host network (see below); reach it at HOST_IP. A bridge
      # container can no longer use the "livekit" service name. Overrides .env.
      - LIVEKIT_URL=ws://${HOST_IP}:7880
    expose:
      - "8000"
    volumes:
      - /dev:/dev # USB cameras
      - ./sessions:/data/sessions # session folder = source of truth (ADR-0011)
    device_cgroup_rules:
      - "c 81:* rmw" # allow video4linux devices (major 81)
    networks:
      - calib-network
    depends_on:
      - livekit
    logging: *default-logging

  # LiveKit JWT token issuance (subscribe-only tokens for the webapp).
  livekit-token-server:
    build:
      context: ./livekit-token-server
      dockerfile: Dockerfile
    container_name: livekit-token-server
    restart: unless-stopped
    env_file:
      - ./.env
    expose:
      - "8080"
    networks:
      - calib-network
    logging: *default-logging

  # LiveKit SFU (upstream). Caddy proxies wss signaling; media goes direct.
  livekit:
    image: livekit/livekit-server:latest
    container_name: calib-livekit
    restart: unless-stopped
    # Host network: LiveKit binds 7880/7882/7883 directly on the host. This is what
    # lets BOTH a LAN browser AND the in-container publisher reach it at HOST_IP — a
    # bridge container cannot hairpin to a *published* port (UDP or TCP), but it CAN
    # reach a *real* host listener at HOST_IP. Ports come from livekit.yaml /
    # --udp-port; no port mapping is used in host mode.
    network_mode: host
    command: --config /etc/livekit.yaml --udp-port ${LIVEKIT_UDP_PORT:-7882}
    environment:
      # Quoted: the ": " must stay part of the string, not be parsed as a YAML map.
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
      - NODE_IP=${HOST_IP} # LAN IP advertised for WebRTC media
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    logging: *default-logging

networks:
  calib-network:
    driver: bridge
