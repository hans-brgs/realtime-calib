# Single stack (ADR-0014): Caddy (TLS) is the mandatory entry point, always present.
# Access: https://<HOST_IP> (tablet) or https://localhost (same-machine).

services:
  # Reverse proxy + TLS termination + static webapp (single entry point).
  caddy:
    build:
      context: .
      dockerfile: caddy/Dockerfile
      args:
        # VITE_HOST_IP is inlined into the webapp at build time, from root HOST_IP.
        VITE_HOST_IP: ${HOST_IP}
    container_name: calib-caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/certs:/certs:ro
    env_file:
      - ./.env
    networks:
      - calib-network
    logging: &default-logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Capture + detection + LiveKit publishing + HTTP API + session state.
  calibration-service:
    build:
      context: ./calibration-service
      dockerfile: Dockerfile
    container_name: calibration-service
    restart: unless-stopped
    env_file:
      # LIVEKIT_URL=ws://livekit:7880 — reaches LiveKit over the shared bridge.
      - ./.env
    expose:
      - "8000"
    volumes:
      - /dev:/dev # USB cameras
      - ./sessions:/data/sessions # session folder = source of truth (ADR-0011)
    device_cgroup_rules:
      - "c 81:* rmw" # allow video4linux devices (major 81)
    networks:
      - calib-network
    depends_on:
      - livekit
    logging: *default-logging

  # LiveKit JWT token issuance (subscribe-only tokens for the webapp).
  livekit-token-server:
    build:
      context: ./livekit-token-server
      dockerfile: Dockerfile
    container_name: livekit-token-server
    restart: unless-stopped
    env_file:
      - ./.env
    expose:
      - "8080"
    networks:
      - calib-network
    logging: *default-logging

  # LiveKit SFU (upstream), on the bridge with the publisher — same structure as
  # vision-services (proven on this host). The in-container publisher reaches it over
  # the shared bridge; the LAN browser reaches the media via the published UDP range
  # + TCP fallback at HOST_IP (NODE_IP). Caddy proxies the wss signaling. No host
  # networking — it was fragile across restarts (ICE hairpin broke on every restart).
  livekit:
    image: livekit/livekit-server:latest
    container_name: calib-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    ports:
      - "7881:7881/tcp" # ICE-TCP fallback (must match livekit.yaml rtc.tcp_port)
      - "50000-50010:50000-50010/udp" # WebRTC media (must match rtc.port_range_*)
    environment:
      # Quoted: the ": " must stay part of the string, not be parsed as a YAML map.
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
      - NODE_IP=${HOST_IP} # LAN IP advertised for WebRTC media
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    networks:
      - calib-network
    logging: *default-logging

networks:
  calib-network:
    driver: bridge
